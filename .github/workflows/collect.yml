name: collect

on:
  schedule:
    # Attempt every 15 min: GitHub's shared cron skips most slots on this
    # repo (observed ~25% fire rate on 2026-07-11), so dense attempts are
    # needed to approach the intended 30-min cadence. poll.py enforces a
    # hard daily request budget, so over-firing can never exceed the TomTom
    # quota. Offsets avoid :00/:15/:30/:45 where the queue is busiest.
    - cron: "2,17,32,47 * * * *"
  workflow_dispatch:

concurrency:
  group: collect
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Poll TomTom
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: python collector/poll.py

      - name: Log weather (rain confounder control)
        run: python collector/weather.py

      - name: Commit data
        run: |
          git config user.name "jam-genome collector"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then echo "no new data"; exit 0; fi
          git commit -m "data: $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase origin main
          git push
